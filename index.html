<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktuálne Počasie</title>
    
    <!-- Favicon s ikonou počasia -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
        }
        .loader {
            border-top-color: #ffffff;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <div class="w-full max-w-md glass-card p-8 shadow-2xl">
        <h1 class="text-3xl font-bold mb-6 text-center">Predpoveď počasia</h1>
        
        <!-- Vyhľadávanie -->
        <div class="relative mb-8">
            <input type="text" id="cityInput" placeholder="Zadajte mesto (napr. Bratislava)" 
                class="w-full bg-white/10 border border-white/20 rounded-xl py-3 px-5 pr-12 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
            <button onclick="getWeather()" id="searchBtn" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center bg-white text-indigo-600 rounded-lg hover:bg-indigo-50 transition">
                <i class="fas fa-search" id="searchIcon"></i>
                <div id="loader" class="hidden loader w-5 h-5 border-2 border-indigo-200 rounded-full"></div>
            </button>
        </div>

        <!-- Info o počasí -->
        <div id="weatherContent" class="text-center hidden animate-fade-in">
            <h2 id="cityName" class="text-4xl font-bold mb-2">---</h2>
            <p id="countryName" class="text-white/70 mb-6 uppercase tracking-widest text-sm">---</p>
            
            <div class="flex justify-center items-center mb-6">
                <img id="weatherIcon" src="" alt="" class="w-24 h-24">
                <span id="temperature" class="text-7xl font-bold ml-2">--°</span>
            </div>
            
            <p id="condition" class="text-xl font-medium mb-8 capitalize">---</p>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 p-4 rounded-2xl border border-white/5">
                    <i class="fas fa-droplet text-blue-300 mb-2"></i>
                    <p class="text-xs text-white/60 uppercase">Vlhkosť</p>
                    <p id="humidity" class="text-lg font-bold">--%</p>
                </div>
                <div class="bg-white/10 p-4 rounded-2xl border border-white/5">
                    <i class="fas fa-wind text-gray-300 mb-2"></i>
                    <p class="text-xs text-white/60 uppercase">Vietor</p>
                    <p id="wind" class="text-lg font-bold">-- km/h</p>
                </div>
            </div>
        </div>

        <!-- Prázdny stav / Loading -->
        <div id="placeholder" class="text-center py-10 opacity-60">
            <i class="fas fa-cloud-sun text-6xl mb-4"></i>
            <p id="placeholderText">Zadajte mesto pre zobrazenie dát</p>
        </div>

        <!-- Chyba -->
        <div id="errorBox" class="hidden mt-4 p-4 bg-red-500/30 border border-red-500/50 rounded-xl text-center text-red-100">
            <i class="fas fa-exclamation-circle mb-2 block text-xl"></i>
            <span id="errorText">Mesto sa nepodarilo nájsť. Skúste to znova.</span>
        </div>
    </div>

    <!-- Pätička -->
    <p class="mt-8 text-white/60 text-sm">
        Powered by <a href="https://www.weatherapi.com/" target="_blank" class="underline hover:text-white transition">WeatherAPI.com</a>
    </p>

    <script>
        // API kľúč bol úspešne vložený
        const apiKey = "4d26366808584183bc3172502262004"; 

        async function getWeather() {
            const cityInput = document.getElementById('cityInput');
            const city = cityInput.value.trim();
            const content = document.getElementById('weatherContent');
            const placeholder = document.getElementById('placeholder');
            const errorBox = document.getElementById('errorBox');
            const loader = document.getElementById('loader');
            const searchIcon = document.getElementById('searchIcon');

            if (!city) return;

            // Spustiť loading stav
            loader.classList.remove('hidden');
            searchIcon.classList.add('hidden');
            errorBox.classList.add('hidden');

            try {
                const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${encodeURIComponent(city)}&lang=sk`);
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error.message || 'Mesto nebolo nájdené');
                }

                const data = await response.json();

                // Naplnenie dát do UI
                document.getElementById('cityName').innerText = data.location.name;
                document.getElementById('countryName').innerText = data.location.country;
                document.getElementById('temperature').innerText = `${Math.round(data.current.temp_c)}°`;
                document.getElementById('condition').innerText = data.current.condition.text;
                document.getElementById('humidity').innerText = `${data.current.humidity}%`;
                document.getElementById('wind').innerText = `${data.current.wind_kph} km/h`;
                document.getElementById('weatherIcon').src = `https:${data.current.condition.icon}`;

                // Prepnutie viditeľnosti
                placeholder.classList.add('hidden');
                errorBox.classList.add('hidden');
                content.classList.remove('hidden');

            } catch (err) {
                console.error("API Error:", err);
                showError("Mesto nebolo nájdené. Skúste zadať iný názov.");
                content.classList.add('hidden');
            } finally {
                // Zrušiť loading stav
                loader.classList.add('hidden');
                searchIcon.classList.remove('hidden');
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const placeholder = document.getElementById('placeholder');
            
            errorText.innerText = msg;
            errorBox.classList.remove('hidden');
            placeholder.classList.add('hidden');
        }

        document.getElementById('cityInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                getWeather();
            }
        });
    </script>
</body>
</html>
